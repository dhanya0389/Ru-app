<?xml version="1.0" encoding="UTF-8"?>
<!--
  COMPOSITION SKETCH for Canva refinement.
  Reference: white sculpted lotus relief on textured plaster wall —
  vertical arrangement of blooms, buds and lily-pad leaves climbing up the left side.
  Intended placement: SIDE (semi-transparent) on every non-Landing screen.
  In Canva: rebuild with sculpted-relief look (3D shadows, plaster texture, drop shadows
  beneath each form). Composition + arrangement preserved here.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 1200" width="400" height="1200"
     fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Composition sketch — vertical arrangement of lotus blooms, buds and leaves on the side">

  <!-- ============== STEMS — multiple thin parallel stems running vertically ============== -->
  <g stroke-width="1.4" opacity="0.7">
    <path d="M 145 1180 C 142 1000, 148 800, 145 600 C 142 400, 148 200, 145 60" />
    <path d="M 175 1180 C 178 1000, 172 800, 175 600 C 178 400, 172 200, 175 80" />
    <path d="M 205 1180 C 202 1000, 208 800, 205 620 C 202 460, 208 320, 205 200" />
    <path d="M 235 1180 C 238 1000, 232 820, 235 660 C 238 520, 232 400, 235 290" />
    <path d="M 265 1180 C 262 1000, 268 850, 265 720 C 262 600, 268 480, 265 380" />
  </g>
  <!-- Stem highlight lines (thinner, lighter) -->
  <g stroke-width="0.5" opacity="0.4">
    <path d="M 145 1180 C 142 1000, 148 800, 145 60" />
    <path d="M 175 1180 C 178 1000, 172 800, 175 80" />
    <path d="M 205 1180 C 202 1000, 208 620, 205 200" />
    <path d="M 235 1180 C 238 1000, 232 660, 235 290" />
    <path d="M 265 1180 C 262 1000, 268 720, 265 380" />
  </g>

  <!-- ============== TOP BUD (upper-most element, around y=60) ============== -->
  <g transform="translate(145 60)">
    <path d="M 0 0 C -16 -10, -16 -34, 0 -50 C 16 -34, 16 -10, 0 0 Z"
          fill="currentColor" fill-opacity="0.10" stroke-width="1.3" />
    <path d="M 0 -8 V -42" stroke-width="0.5" opacity="0.5" />
    <path d="M -5 -16 C -3 -28, -2 -36, 0 -42" stroke-width="0.4" opacity="0.4" />
    <path d="M 5 -16 C 3 -28, 2 -36, 0 -42" stroke-width="0.4" opacity="0.4" />
  </g>

  <!-- ============== UPPER OPEN BLOOM (around y=180) — medium size ============== -->
  <g transform="translate(175 180)">
    <!-- Outer petals -->
    <g fill="currentColor" fill-opacity="0.06" stroke-width="1.3">
      <path d="M 0 0 C -75 -16, -120 -16, -150 0 C -120 16, -75 16, 0 0 Z" />
      <path d="M 0 0 C 75 -16, 120 -16, 150 0 C 120 16, 75 16, 0 0 Z" />
      <path d="M 0 0 C -68 -54, -120 -82, -150 -76 C -125 -32, -55 -8, 0 0 Z" />
      <path d="M 0 0 C 68 -54, 120 -82, 150 -76 C 125 -32, 55 -8, 0 0 Z" />
    </g>
    <!-- Middle ring -->
    <g fill="currentColor" fill-opacity="0.10" stroke-width="1.4">
      <path d="M 0 0 C -54 -50, -106 -86, -130 -110 C -100 -72, -48 -28, 0 0 Z" />
      <path d="M 0 0 C 54 -50, 106 -86, 130 -110 C 100 -72, 48 -28, 0 0 Z" />
      <path d="M 0 0 C -30 -56, -58 -116, -56 -146 C -36 -94, -6 -42, 0 0 Z" />
      <path d="M 0 0 C 30 -56, 58 -116, 56 -146 C 36 -94, 6 -42, 0 0 Z" />
    </g>
    <!-- Center -->
    <g fill="currentColor" fill-opacity="0.14" stroke-width="1.5">
      <path d="M 0 0 C -16 -56, -16 -116, 0 -158 C 16 -116, 16 -56, 0 0 Z" />
    </g>
    <!-- Receptacle -->
    <path d="M -15 4 C -15 18, 15 18, 15 4" stroke-width="1.0" opacity="0.7" />
    <g fill="currentColor" opacity="0.55">
      <circle cx="-9" cy="11" r="1.6" />
      <circle cx="-2" cy="13" r="1.6" />
      <circle cx="6" cy="13" r="1.6" />
      <circle cx="11" cy="11" r="1.6" />
    </g>
    <!-- Veins -->
    <g stroke-width="0.6" opacity="0.4">
      <path d="M 0 -6 V -150" />
      <path d="M -8 -8 C -22 -56, -42 -110, -52 -138" />
      <path d="M 8 -8 C 22 -56, 42 -110, 52 -138" />
    </g>
  </g>

  <!-- ============== MID BUD (around y=320) ============== -->
  <g transform="translate(235 290)">
    <path d="M 0 0 C -14 -12, -14 -38, 0 -56 C 14 -38, 14 -12, 0 0 Z"
          fill="currentColor" fill-opacity="0.10" stroke-width="1.3" />
    <path d="M 0 -8 V -48" stroke-width="0.5" opacity="0.5" />
    <path d="M -4 -16 C -3 -30, -2 -40, -1 -48" stroke-width="0.4" opacity="0.4" />
    <path d="M 4 -16 C 3 -30, 2 -40, 1 -48" stroke-width="0.4" opacity="0.4" />
  </g>

  <!-- ============== LARGE LILY PAD LEAF (mid-left, around y=440) ============== -->
  <g transform="translate(125 440)">
    <!-- Wavy curled lily pad shape -->
    <path d="M 0 0
             C -50 -20, -100 -10, -120 12
             C -100 30, -50 38, 0 28
             C 30 22, 36 14, 30 4
             C 24 -2, 12 -2, 0 0 Z"
          fill="currentColor" fill-opacity="0.09" stroke-width="1.3" />
    <!-- Leaf veins (radiating from attach point) -->
    <g stroke-width="0.5" opacity="0.45">
      <path d="M 0 6 C -30 12, -70 18, -100 22" />
      <path d="M 0 0 C -40 0, -80 4, -110 14" />
      <path d="M -10 14 C -40 22, -70 28, -100 30" />
      <path d="M 6 -2 C 20 -2, 28 0, 32 4" />
    </g>
    <!-- Wavy edge accent -->
    <path d="M -120 12 C -118 6, -116 0, -110 -4" stroke-width="0.5" opacity="0.4" />
  </g>

  <!-- ============== MID OPEN BLOOM (around y=560) — slightly smaller ============== -->
  <g transform="translate(155 560)">
    <!-- Outer -->
    <g fill="currentColor" fill-opacity="0.06" stroke-width="1.2">
      <path d="M 0 0 C -62 -14, -100 -14, -125 0 C -100 14, -62 14, 0 0 Z" />
      <path d="M 0 0 C 62 -14, 100 -14, 125 0 C 100 14, 62 14, 0 0 Z" />
      <path d="M 0 0 C -56 -45, -100 -68, -125 -64 C -105 -28, -45 -7, 0 0 Z" />
      <path d="M 0 0 C 56 -45, 100 -68, 125 -64 C 105 -28, 45 -7, 0 0 Z" />
    </g>
    <!-- Middle -->
    <g fill="currentColor" fill-opacity="0.10" stroke-width="1.3">
      <path d="M 0 0 C -45 -42, -88 -72, -108 -92 C -83 -60, -40 -23, 0 0 Z" />
      <path d="M 0 0 C 45 -42, 88 -72, 108 -92 C 83 -60, 40 -23, 0 0 Z" />
      <path d="M 0 0 C -25 -47, -48 -97, -47 -122 C -30 -78, -5 -35, 0 0 Z" />
      <path d="M 0 0 C 25 -47, 48 -97, 47 -122 C 30 -78, 5 -35, 0 0 Z" />
    </g>
    <!-- Center -->
    <g fill="currentColor" fill-opacity="0.13" stroke-width="1.4">
      <path d="M 0 0 C -13 -47, -13 -96, 0 -130 C 13 -96, 13 -47, 0 0 Z" />
    </g>
    <!-- Receptacle -->
    <path d="M -12 4 C -12 16, 12 16, 12 4" stroke-width="1.0" opacity="0.7" />
    <g fill="currentColor" opacity="0.55">
      <circle cx="-7" cy="9" r="1.4" />
      <circle cx="-1" cy="11" r="1.4" />
      <circle cx="5" cy="11" r="1.4" />
      <circle cx="10" cy="9" r="1.4" />
    </g>
    <g stroke-width="0.5" opacity="0.4">
      <path d="M 0 -5 V -125" />
      <path d="M -7 -7 C -19 -47, -36 -92, -44 -114" />
      <path d="M 7 -7 C 19 -47, 36 -92, 44 -114" />
    </g>
  </g>

  <!-- ============== SMALL CURLED LEAF (around y=700, on right) ============== -->
  <g transform="translate(280 700)">
    <path d="M 0 0
             C 40 -12, 78 -2, 92 18
             C 76 32, 38 38, 4 28
             C -10 22, -8 10, 0 0 Z"
          fill="currentColor" fill-opacity="0.09" stroke-width="1.2" />
    <g stroke-width="0.5" opacity="0.45">
      <path d="M 6 8 C 26 12, 50 18, 80 22" />
      <path d="M 4 0 C 30 0, 56 4, 84 14" />
    </g>
    <!-- Curled edge accent -->
    <path d="M 92 18 C 88 8, 80 4, 70 0" stroke-width="0.5" opacity="0.4" />
  </g>

  <!-- ============== SMALL BUD (around y=850) ============== -->
  <g transform="translate(265 850)">
    <path d="M 0 0 C -12 -10, -12 -32, 0 -46 C 12 -32, 12 -10, 0 0 Z"
          fill="currentColor" fill-opacity="0.10" stroke-width="1.2" />
    <path d="M 0 -8 V -38" stroke-width="0.4" opacity="0.5" />
  </g>

  <!-- ============== BOTTOM OPEN BLOOM (around y=1000) — large, anchor of arrangement ============== -->
  <g transform="translate(195 1000)">
    <!-- Outer -->
    <g fill="currentColor" fill-opacity="0.06" stroke-width="1.3">
      <path d="M 0 0 C -85 -18, -135 -18, -165 0 C -135 18, -85 18, 0 0 Z" />
      <path d="M 0 0 C 85 -18, 135 -18, 165 0 C 135 18, 85 18, 0 0 Z" />
      <path d="M 0 0 C -75 -60, -135 -90, -165 -85 C -140 -36, -60 -10, 0 0 Z" />
      <path d="M 0 0 C 75 -60, 135 -90, 165 -85 C 140 -36, 60 -10, 0 0 Z" />
    </g>
    <!-- Middle -->
    <g fill="currentColor" fill-opacity="0.10" stroke-width="1.4">
      <path d="M 0 0 C -60 -56, -118 -96, -145 -120 C -110 -80, -54 -32, 0 0 Z" />
      <path d="M 0 0 C 60 -56, 118 -96, 145 -120 C 110 -80, 54 -32, 0 0 Z" />
      <path d="M 0 0 C -34 -64, -65 -130, -62 -160 C -40 -106, -8 -48, 0 0 Z" />
      <path d="M 0 0 C 34 -64, 65 -130, 62 -160 C 40 -106, 8 -48, 0 0 Z" />
    </g>
    <!-- Center -->
    <g fill="currentColor" fill-opacity="0.14" stroke-width="1.5">
      <path d="M 0 0 C -18 -64, -18 -132, 0 -178 C 18 -132, 18 -64, 0 0 Z" />
    </g>
    <!-- Receptacle - prominent -->
    <path d="M -18 6 C -18 22, 18 22, 18 6" stroke-width="1.1" opacity="0.7" />
    <g fill="currentColor" opacity="0.55">
      <circle cx="-12" cy="14" r="1.8" />
      <circle cx="-4" cy="17" r="1.8" />
      <circle cx="4" cy="17" r="1.8" />
      <circle cx="12" cy="14" r="1.8" />
      <circle cx="0" cy="20" r="1.6" />
    </g>
    <!-- Veins -->
    <g stroke-width="0.7" opacity="0.4">
      <path d="M 0 -7 V -170" />
      <path d="M -10 -9 C -28 -64, -52 -124, -64 -156" />
      <path d="M 10 -9 C 28 -64, 52 -124, 64 -156" />
      <path d="M -28 -7 C -68 -50, -112 -90, -140 -116" />
      <path d="M 28 -7 C 68 -50, 112 -90, 140 -116" />
    </g>
  </g>

  <!-- ============== SMALL LEAF AT BASE (around y=1130) ============== -->
  <g transform="translate(85 1130)">
    <path d="M 0 0
             C -32 -10, -62 -2, -72 14
             C -60 26, -32 30, -6 22
             C 6 18, 6 8, 0 0 Z"
          fill="currentColor" fill-opacity="0.08" stroke-width="1.2" />
    <g stroke-width="0.5" opacity="0.45">
      <path d="M -4 6 C -22 10, -42 16, -62 18" />
    </g>
  </g>
</svg>
